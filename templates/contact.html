<section class="contact" id="contact">
    <style>
        .contact {
            position: relative;
            padding: 7rem 2rem;
            background:
                linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(120deg, rgba(255, 183, 77, 0.11), transparent 34%),
                linear-gradient(300deg, rgba(22, 163, 74, 0.12), transparent 38%),
                linear-gradient(135deg, #101114 0%, #151711 48%, #08120f 100%);
            background-size: 74px 74px, 74px 74px, auto, auto, auto;
            color: #f4f7ee;
            overflow: hidden;
        }

        .contact::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            left: -160px;
            top: 80px;
            border-radius: 50%;
            background: rgba(246, 183, 60, 0.12);
            filter: blur(70px);
        }

        .contact::after {
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            right: -140px;
            bottom: 60px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.12);
            filter: blur(70px);
        }

        .contact-content {
            position: relative;
            z-index: 2;
            max-width: 1160px;
            margin: 0 auto;
        }

        .contact-title {
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 800;
            color: #f4f7ee;
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .contact-title::after {
            content: "";
            display: block;
            width: 86px;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            margin: 16px auto 0;
        }

        .contact-layout {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 34px;
            align-items: start;
        }

        .contact-info {
            display: grid;
            gap: 22px;
        }

        .contact-info-card {
            display: flex;
            align-items: center;
            gap: 20px;
            min-height: 112px;
            padding: 26px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.075);
            border: 1px solid rgba(246, 183, 60, 0.22);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
            transition: 0.35s ease;
        }

        .contact-info-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 80px rgba(245, 158, 11, 0.18);
        }

        .contact-info-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #101114;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            font-size: 1.65rem;
            flex: 0 0 auto;
        }

        .contact-info-card h3 {
            color: #f4f7ee;
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        .contact-info-card a,
        .contact-info-card p {
            color: #d9dfd1;
            font-size: 1rem;
            line-height: 1.6;
            text-decoration: none;
            overflow-wrap: anywhere;
        }

        .contact-info-card a:hover {
            color: #f6b73c;
        }

        /* ── Form ─────────────────────────────── */
        .contact-form {
            padding: 42px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.075);
            border: 1px solid rgba(246, 183, 60, 0.22);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.55rem;
            color: #f4f7ee;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.95rem 1rem;
            border: 1px solid rgba(246, 183, 60, 0.22);
            border-radius: 14px;
            font-size: 1rem;
            color: #14111f;
            background: rgba(255, 255, 255, 0.92);
            outline: none;
            transition: 0.3s ease;
            resize: none;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #f6b73c;
            box-shadow: 0 0 0 4px rgba(246, 183, 60, 0.14);
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            color: #101114;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            box-shadow: 0 16px 34px rgba(245, 158, 11, 0.28);
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 42px rgba(34, 197, 94, 0.32);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ── Confirmation card ─────────────────── */
        .confirm-card {
            display: none;
            padding: 42px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.075);
            border: 1px solid rgba(246, 183, 60, 0.22);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
            animation: fadeSlideUp 0.5s ease forwards;
        }

        .confirm-card.visible {
            display: block;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .confirm-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #101114;
            margin: 0 auto 20px;
        }

        .confirm-heading {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: #f4f7ee;
            margin: 0 0 6px;
        }

        .confirm-sub {
            text-align: center;
            font-size: 0.95rem;
            color: #9ca89a;
            margin: 0 0 28px;
        }

        .confirm-details {
            display: flex;
            flex-direction: column;
            gap: 0;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(246, 183, 60, 0.18);
            margin-bottom: 24px;
        }

        .confirm-row {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(246, 183, 60, 0.1);
        }

        .confirm-row:last-child {
            border-bottom: none;
        }

        .confirm-label {
            min-width: 90px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #f6b73c;
            display: flex;
            align-items: center;
            gap: 7px;
            padding-top: 2px;
        }

        .confirm-value {
            font-size: 0.95rem;
            color: #e8ede3;
            line-height: 1.6;
            word-break: break-word;
        }

        .send-again-btn {
            width: 100%;
            height: 48px;
            border: 1px solid rgba(246, 183, 60, 0.35);
            border-radius: 14px;
            cursor: pointer;
            color: #f6b73c;
            font-size: 0.95rem;
            font-weight: 600;
            background: transparent;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .send-again-btn:hover {
            background: rgba(246, 183, 60, 0.1);
            transform: translateY(-2px);
        }

        /* ── Toast ─────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 9999;
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #101114;
            box-shadow: 0 16px 40px rgba(0,0,0,0.28);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(80px);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
            pointer-events: none;
        }

        .toast.toast-success { background: linear-gradient(135deg, #f59e0b, #22c55e); }
        .toast.toast-error   { background: linear-gradient(135deg, #ef4444, #f97316); color: #fff; }
        .toast.show          { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            .contact { padding: 5.5rem 1.2rem; }
            .contact-form,
            .confirm-card { padding: 28px; }
            .contact-layout { grid-template-columns: 1fr; }
            .contact-info-card { padding: 22px; }
            .toast { bottom: 20px; right: 16px; left: 16px; }
        }
    </style>

    <div class="contact-content">
        <h2 class="contact-title">Get In Touch</h2>

        <div class="contact-layout">

            <!-- Left: info cards (unchanged) -->
            <div class="contact-info">
                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <div>
                        <h3>Call Me</h3>
                        <a href="tel:+919075736268">+91 9075736268</a>
                    </div>
                </div>

                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <div>
                        <h3>Email Me</h3>
                        <a href="mailto:nikamdevendra1004@gmail.com">nikamdevendra1004@gmail.com</a>
                    </div>
                </div>

                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <div>
                        <h3>Location</h3>
                        <p>Pune, Maharashtra, India</p>
                    </div>
                </div>
            </div>

            <!-- Right: form (id + novalidate added; no method="POST") -->
            <form class="contact-form" id="contactForm" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Devendra Nikam"
                        pattern="^[A-Za-z]+ [A-Za-z]+$"
                        title="Enter first and last name, for example Devendra Nikam"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        title="Enter a valid email address"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea
                        rows="5"
                        id="message"
                        name="message"
                        placeholder="Write your message here…"
                        maxlength="300"
                        required
                    ></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span id="submitText">Send Message</span>
                </button>
            </form>

            <!-- Confirmation card (hidden until email is sent) -->
            <div class="confirm-card" id="confirmCard">
                <div class="confirm-icon">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <h3 class="confirm-heading">Message Sent!</h3>
                <p class="confirm-sub">Here's what you shared — I'll get back to you soon.</p>

                <div class="confirm-details">
                    <div class="confirm-row">
                        <span class="confirm-label">
                            <i class="fa-solid fa-user"></i> Name
                        </span>
                        <span class="confirm-value" id="confirmName"></span>
                    </div>
                    <div class="confirm-row">
                        <span class="confirm-label">
                            <i class="fa-regular fa-envelope"></i> Email
                        </span>
                        <span class="confirm-value" id="confirmEmail"></span>
                    </div>
                    <div class="confirm-row">
                        <span class="confirm-label">
                            <i class="fa-regular fa-comment-dots"></i> Message
                        </span>
                        <span class="confirm-value" id="confirmMessage"></span>
                    </div>
                </div>

                <button class="send-again-btn" id="sendAgainBtn">
                    <i class="fa-solid fa-rotate-left"></i> Send another message
                </button>
            </div>

        </div>
    </div>
</section>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- EmailJS SDK — must come before your JS file -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="{{ url_for('static', filename='js/contact-emailjs.js') }}"></script>
