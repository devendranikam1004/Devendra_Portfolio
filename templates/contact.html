<section class="contact" id="contact">
    <style>
        .contact {
            position: relative;
            padding: 7rem 2rem;
            background:
                linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(120deg, rgba(255, 183, 77, 0.11), transparent 34%),
                linear-gradient(300deg, rgba(22, 163, 74, 0.12), transparent 38%),
                linear-gradient(135deg, #101114 0%, #151711 48%, #08120f 100%);
            background-size: 74px 74px, 74px 74px, auto, auto, auto;
            color: #f4f7ee;
            overflow: hidden;
        }

        .contact::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            left: -160px;
            top: 80px;
            border-radius: 50%;
            background: rgba(246, 183, 60, 0.12);
            filter: blur(70px);
        }

        .contact::after {
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            right: -140px;
            bottom: 60px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.12);
            filter: blur(70px);
        }

        .contact-content {
            position: relative;
            z-index: 2;
            max-width: 1160px;
            margin: 0 auto;
        }

        .contact-title {
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 800;
            color: #14111f;
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .contact-title::after {
            content: "";
            display: block;
            width: 86px;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            margin: 16px auto 0;
        }

        .contact-layout {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 34px;
            align-items: start;
        }

        .contact-info {
            display: grid;
            gap: 22px;
        }

        .contact-info-card {
            display: flex;
            align-items: center;
            gap: 20px;
            min-height: 112px;
            padding: 26px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.075);
            border: 1px solid rgba(246, 183, 60, 0.22);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
            transition: 0.35s ease;
        }

        .contact-info-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 80px rgba(245, 158, 11, 0.18);
        }

        .contact-info-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #101114;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            font-size: 1.65rem;
            flex: 0 0 auto;
        }

        .contact-info-card h3 {
            color: #f4f7ee;
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        .contact-info-card a,
        .contact-info-card p {
            color: #d9dfd1;
            font-size: 1rem;
            line-height: 1.6;
            text-decoration: none;
            overflow-wrap: anywhere;
        }

        .contact-info-card a:hover {
            color: #f6b73c;
        }

        .contact-form {
            padding: 42px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.075);
            border: 1px solid rgba(246, 183, 60, 0.22);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.55rem;
            color: #f4f7ee;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.95rem 1rem;
            border: 1px solid rgba(246, 183, 60, 0.22);
            border-radius: 14px;
            font-size: 1rem;
            color: #14111f;
            background: rgba(255, 255, 255, 0.92);
            outline: none;
            transition: 0.3s ease;
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #f6b73c;
            box-shadow: 0 0 0 4px rgba(246, 183, 60, 0.14);
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            color: #101114;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            box-shadow: 0 16px 34px rgba(245, 158, 11, 0.28);
            transition: 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 42px rgba(34, 197, 94, 0.32);
        }

        @media (max-width: 768px) {
            .contact {
                padding: 5.5rem 1.2rem;
            }

            .contact-form {
                padding: 28px;
            }

            .contact-layout {
                grid-template-columns: 1fr;
            }

            .contact-info-card {
                padding: 22px;
            }
        }
    </style>

    <div class="contact-content">
        <h2 class="contact-title">Get In Touch</h2>

        <div class="contact-layout">
            <div class="contact-info">
                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-solid fa-phone"></i>
                    </span>

                    <div>
                        <h3>Call Me</h3>
                        <a href="tel:+919075736268">+91 9075736268</a>
                    </div>
                </div>

                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-regular fa-envelope"></i>
                    </span>

                    <div>
                        <h3>Email Me</h3>
                        <a href="mailto:nikamdevendra1004@gmail.com">nikamdevendra1004@gmail.com</a>
                    </div>
                </div>

                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>

                    <div>
                        <h3>Location</h3>
                        <p>Pune, Maharashtra, India</p>
                    </div>
                </div>
            </div>

            <form class="contact-form" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        pattern="^[A-Za-z]+ [A-Za-z]+$"
                        title="Enter first and last name, for example Devendra Nikam"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        title="Enter a valid email address"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea
                        rows="5"
                        id="message"
                        name="message"
                        maxlength="300"
                        required
                    ></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
</section>
