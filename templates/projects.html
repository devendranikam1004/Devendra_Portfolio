<section class="works" id="work">
    <style>
        .works {
            position: relative;
            padding: 7rem 2rem;
            background:
                linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(120deg, rgba(255, 183, 77, 0.11), transparent 34%),
                linear-gradient(300deg, rgba(22, 163, 74, 0.12), transparent 38%),
                linear-gradient(135deg, #101114 0%, #151711 48%, #08120f 100%);
            background-size: 74px 74px, 74px 74px, auto, auto, auto;
            color: #f4f7ee;
            overflow: hidden;
        }

        .works::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            left: -180px;
            bottom: 80px;
            border-radius: 50%;
            background: rgba(246, 183, 60, 0.12);
            filter: blur(70px);
        }

        .work-section {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
        }

        .works .section-title {
            font-size: clamp(2.6rem, 5vw, 4rem);
            font-weight: 800;
            color: #f4f7ee;
            margin-bottom: 4rem;
            background: none;
            -webkit-text-fill-color: initial;
        }

        .works .section-title::after {
            content: "";
            display: block;
            width: 88px;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            margin-top: 16px;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
            align-items: stretch;
        }

        .work-card {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.075);
            border: 1px solid rgba(246, 183, 60, 0.22);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
            transition: 0.35s ease;
            display: flex;
            flex-direction: column;
        }

        .work-card:focus-visible {
            outline: 3px solid #f6b73c;
            outline-offset: 4px;
        }

        .work-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 28px 80px rgba(245, 158, 11, 0.18);
        }

        .work-img {
            width: 100%;
            height: 260px;
            object-fit: fill;
            object-position: center;
            display: block;
            cursor: pointer;
            transition: transform 0.45s ease, filter 0.35s ease;
        }

        .work-card:hover .work-img {
            filter: saturate(1.12) contrast(1.04);
        }

        .work-info {
            padding: 28px;
            display: flex;
            flex: 1;
            flex-direction: column;
            cursor: pointer;
        }

        .work-info h2 {
            font-size: 1.35rem;
            color: #fff;
            margin-bottom: 14px;
        }

        .work-info p {
            color: #d9dfd1;
            line-height: 1.75;
            font-size: 0.98rem;
            flex: 1;
        }

        .work-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 26px;
        }

        .work-actions a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 46px;
            padding: 0 18px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .details-btn {
            color: #fff;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            color: #101114;
        }

        .source-btn {
            color: #f6b73c;
            background: rgba(246, 183, 60, 0.10);
            border: 1px solid rgba(246, 183, 60, 0.28);
        }

        .work-actions a:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 34px rgba(245, 158, 11, 0.24);
        }

        .details-btn:hover {
            background: #22c55e;
        }

        @media (max-width: 768px) {
            .works {
                padding: 5.5rem 1.2rem;
            }

            .works-grid {
                grid-template-columns: 1fr;
            }

            .work-img {
                height: 240px;
            }

            .work-actions a {
                flex: 1 1 150px;
            }
        }
    </style>

    <div class="work-section">
        <h2 class="section-title">Recent Works</h2>

        <div class="works-grid">
            {% for project_slug, project in projects.items() %}
            <div class="work-card animate-scale"
                 data-detail-url="{{ url_for('project_page', project_name=project_slug) }}"
                 tabindex="0"
                 role="link"
                 aria-label="View details for {{ project.title }}"
                 style="animation-delay: {{ 0.08 + (loop.index0 * 0.08) }}s;">
                <img src="{{ url_for('static', filename=project.image) }}" alt="{{ project.title }}" class="work-img">

                <div class="work-info">
                    <h2>{{ project.title }}</h2>

                    <p>
                        {{ project.description }}
                    </p>

                    <div class="work-actions">
                        <a href="{{ url_for('project_page', project_name=project_slug) }}" class="details-btn">
                            View Details
                        </a>

                        <a href="{{ project.source }}" target="_blank" class="source-btn">
                            <i class="fas fa-external-link-alt"></i> Source
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
